name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  core:
    name: governor-core (Python) — lint + parity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest ruff
      # Parity tests touch only the pure extractor/manifest code (no engine needed).
      # The wire integration (boot + /decide against credence-skin) is gated separately
      # once the image pull is wired, mirroring the engine repo's test_skin.py.
      - name: Lint
        run: ruff check packages/governor_core/credence_governor_core
      - name: Parity tests
        run: python -m pytest packages/governor_core/tests -q

  openclaw-adapter:
    name: adapters/openclaw (TS) — build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: adapters/openclaw
        run: npm ci || npm install
      - working-directory: adapters/openclaw
        run: npm run build --if-present
      - working-directory: adapters/openclaw
        run: npm test --if-present
