# membrane.conf — systemd user drop-in enabling the proplang membrane SHADOW
# (governance-roadmap Phase 2). Install:
#   mkdir -p ~/.config/systemd/user/credence-governor.service.d
#   cp membrane.conf ~/.config/systemd/user/credence-governor.service.d/
#   systemctl --user daemon-reload && systemctl --user restart credence-governor
# Rollback = delete this file + restart (zero-shadow; a config change, not a rebuild).
#
# The binary at %h/.local/bin/proplang-govhost is a copied build artifact of the
# FROZEN proplang repo (no proplang edit). Provenance at first field deploy:
#   proplang tag: d-close
#   sha256: 96ec3de7a59100c8d46d569452af0f379ee6f0e44036f7706e8282af1ffd6c18
# Re-record both lines whenever the binary is refreshed.
#
# CREDENCE_MEMBRANE_UTILITY runs the DUAL shadow: table@1 (the non-degenerate
# challenger policy the outcome bench scores) + latent@1 (the wire-v2 field
# reading; stated prediction: constant block, ask-rate 0 — docs/membrane-shadow.md).
# LANG pins a UTF-8 locale for the GHC runtime (the membrane's recorded locale
# incident; the wire itself is ASCII).

[Service]
Environment=CREDENCE_MEMBRANE_COMMAND=%h/.local/bin/proplang-govhost
Environment=CREDENCE_MEMBRANE_UTILITY=table@1,latent@1
Environment=LANG=C.UTF-8
